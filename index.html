<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelompok 5 Anggota - Creative Team</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(118, 75, 162, 0.2);
            filter: blur(120px);
            border-radius: 50%;
            z-index: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 30px;
            text-align: center;
            max-width: 900px;
            width: 100%;
            z-index: 1;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 { color: #a29bfe; font-weight: 400; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 10px; }
        h1 { color: #fff; font-size: 2.8rem; font-weight: 800; margin-bottom: 45px; }

        .member-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }

        .member-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 25px 15px;
            border-radius: 20px;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            grid-column: span 2;
            cursor: pointer;
        }

        .member-photo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid #a29bfe;
            object-fit: cover;
            background: #24243e;
        }

        .member-name { font-weight: 600; font-size: 1rem; margin-bottom: 5px; }
        .member-npm { font-size: 0.8rem; color: #a29bfe; font-weight: 400; background: rgba(162, 155, 254, 0.1); padding: 2px 10px; border-radius: 20px; }

        .member-item:nth-child(4) { grid-column: 2 / span 2; }
        .member-item:nth-child(5) { grid-column: 4 / span 2; }

        .member-item:hover {
            background: rgba(162, 155, 254, 0.15);
            transform: translateY(-10px);
            border-color: rgba(162, 155, 254, 0.5);
        }

        /* Modal Style */
        .desc-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .desc-content {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 30px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            animation: zoomIn 0.3s ease forwards;
            color: white;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            margin-top: 25px;
            background: #a29bfe;
            color: #0f0c29;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
        }

        @media (max-width: 768px) { .member-item, .member-item:nth-child(4), .member-item:nth-child(5) { grid-column: span 3; } }
        @media (max-width: 500px) { h1 { font-size: 2rem; } .member-item, .member-item:nth-child(4), .member-item:nth-child(5) { grid-column: span 6; } }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="glass-card">
        <h2>Creative Team</h2>
        <h1>NAMA KELOMPOK</h1>
        
        <div class="member-container">
            <!-- Akmal -->
            <div class="member-item" onclick="showDesc('Akmal Rahman', '10123092', 'Deskripsi tentang Akmal Rahman.')">
                <img src="https://raw.githubusercontent.com/IndraAdityaW/apalah/main/akmal.jpg" alt="Akmal Rahman" class="member-photo">
                <div class="member-name">Akmal Rahman</div>
                <div class="member-npm">10123092</div>
            </div>

            <!-- Alan -->
            <div class="member-item" onclick="showDesc('Alan Delon Setiawan', '10123095', 'Deskripsi tentang Alan Delon Setiawan.')">
                <img src="https://raw.githubusercontent.com/IndraAdityaW/apalah/main/alan.jpg" alt="Alan Delon Setiawan" class="member-photo">
                <div class="member-name">Alan Delon Setiawan</div>
                <div class="member-npm">10123095</div>
            </div>

            <!-- Indra -->
            <div class="member-item" onclick="showDesc('Indra Aditya Wibowo', '10123532', 'Indra bertugas menyusun struktur kode HTML serta mengelola aset visual kelompok.')">
                <img src="https://raw.githubusercontent.com/IndraAdityaW/apalah/main/german-licciardi-oda1.jpg" alt="Indra Aditya Wibowo" class="member-photo">
                <div class="member-name">Indra Aditya Wibowo</div>
                <div class="member-npm">10123532</div>
            </div>

            <!-- Zaki -->
            <div class="member-item" onclick="showDesc('Muhammad Zaki Abdullah', '10123925', 'Deskripsi tentang Muhammad Zaki Abdullah.')">
                <img src="https://raw.githubusercontent.com/IndraAdityaW/apalah/main/zaki.jpg" alt="Muhammad Zaki Abdullah" class="member-photo">
                <div class="member-name">Muhammad Zaki Abdullah</div>
                <div class="member-npm">10123925</div>
            </div>

            <!-- Ridlo (Masih Placeholder) -->
            <div class="member-item" onclick="showDesc('Ridlo Aminudin', '11123172', 'Deskripsi tentang Ridlo Aminudin.')">
                <img src="https://via.placeholder.com/150" alt="Ridlo Aminudin" class="member-photo">
                <div class="member-name">Ridlo Aminudin</div>
                <div class="member-npm">11123172</div>
            </div>
        </div>

        <p style="color: rgba(255,255,255,0.5); margin-top: 30px; font-size: 0.8rem;">Klik pada kartu untuk deskripsi anggota</p>
    </div>

    <div class="desc-overlay" id="descOverlay" onclick="closeDesc()">
        <div class="desc-content" onclick="event.stopPropagation()">
            <h3 id="descName" style="font-size: 1.5rem; margin-bottom: 5px;">Nama Member</h3>
            <span id="descNPM" style="color: #a29bfe; font-size: 1rem; font-weight: 600;">NPM</span>
            <p id="descText" style="margin-top: 20px; line-height: 1.6; color: #ccc; font-size: 0.95rem;"></p>
            <div class="close-btn" onclick="closeDesc()">Tutup</div>
        </div>
    </div>

    <script>
        function showDesc(name, npm, text) {
            document.getElementById('descName').innerText = name;
            document.getElementById('descNPM').innerText = "NPM: " + npm;
            document.getElementById('descText').innerText = text;
            document.getElementById('descOverlay').style.display = 'flex';
        }
        function closeDesc() { document.getElementById('descOverlay').style.display = 'none'; }
    </script>
</body>
</html>
