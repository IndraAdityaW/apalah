<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelompok 5 Anggota - Creative Team</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(118, 75, 162, 0.2);
            filter: blur(120px);
            border-radius: 50%;
            z-index: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 30px;
            text-align: center;
            max-width: 900px;
            width: 100%;
            z-index: 1;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 {
            color: #a29bfe;
            font-weight: 400;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        h1 {
            color: #fff;
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 45px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Container Grid */
        .member-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }

        .member-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 25px 15px;
            border-radius: 20px;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            grid-column: span 2; /* Default 3 kolom di layar besar */
        }

        /* Foto Member */
        .member-photo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid #a29bfe;
            object-fit: cover;
            background: #24243e;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .member-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 5px;
            line-height: 1.3;
        }

        .member-npm {
            font-size: 0.8rem;
            color: #a29bfe;
            font-weight: 400;
            background: rgba(162, 155, 254, 0.1);
            padding: 2px 10px;
            border-radius: 20px;
        }

        /* Penataan khusus untuk member ke-4 dan ke-5 agar di tengah (baris kedua) */
        .member-item:nth-child(4) {
            grid-column: 2 / span 2;
        }
        .member-item:nth-child(5) {
            grid-column: 4 / span 2;
        }

        .member-item:hover {
            background: rgba(162, 155, 254, 0.15);
            transform: translateY(-10px);
            border-color: rgba(162, 155, 254, 0.5);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .btn {
            margin-top: 50px;
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
        }

        .btn:hover {
            box-shadow: 0 15px 30px rgba(108, 92, 231, 0.5);
            transform: scale(1.05);
        }

        /* Responsif Mobile */
        @media (max-width: 768px) {
            .member-item, 
            .member-item:nth-child(4), 
            .member-item:nth-child(5) {
                grid-column: span 3; /* Jadi 2 kolom di tablet */
            }
        }

        @media (max-width: 500px) {
            h1 { font-size: 2rem; }
            .member-item, 
            .member-item:nth-child(4), 
            .member-item:nth-child(5) {
                grid-column: span 6; /* Jadi 1 kolom di HP */
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="glass-card">
        <h2>Creative Team</h2>
        <h1>NAMA KELOMPOK</h1>
        
        <div class="member-container">
            <!-- Member 1 -->
            <div class="member-item">
                <img src="https://via.placeholder.com/150" alt="Akmal Rahman" class="member-photo">
                <div class="member-name">Akmal Rahman</div>
                <div class="member-npm">10123092</div>
            </div>

            <!-- Member 2 -->
            <div class="member-item">
                <img src="https://via.placeholder.com/150" alt="Alan Delon Setiawan" class="member-photo">
                <div class="member-name">Alan Delon Setiawan</div>
                <div class="member-npm">10123095</div>
            </div>

            <!-- Member 3 -->
            <div class="member-item">
                <img src="https://raw.githubusercontent.com/IndraAdityaW/apalah/main/german-licciardi-oda1.jpg](https://raw.githubusercontent.com/IndraAdityaW/apalah/main/german-licciardi-oda1.jpg" alt="Indra Aditya Wibowo" class="member-photo">
                <div class="member-name">Indra Aditya Wibowo</div>
                <div class="member-npm">10123532</div>
            </div>

            <!-- Member 4 -->
            <div class="member-item">
                <img src="https://via.placeholder.com/150" alt="Muhammad Zaki Abdullah" class="member-photo">
                <div class="member-name">Muhammad Zaki Abdullah</div>
                <div class="member-npm">10123925</div>
            </div>

            <!-- Member 5 -->
            <div class="member-item">
                <img src="https://via.placeholder.com/150" alt="Ridlo Aminudin" class="member-photo">
                <div class="member-name">Ridlo Aminudin</div>
                <div class="member-npm">11123172</div>
            </div>
        </div>

        <a href="#" class="btn">Kenali Lebih Jauh</a>
    </div>

</body>
</html>
