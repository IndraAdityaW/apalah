<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelompok 5 Anggota</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Latar Belakang Abstrak */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(118, 75, 162, 0.3);
            filter: blur(100px);
            border-radius: 50%;
            z-index: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            max-width: 700px;
            width: 100%;
            z-index: 1;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 {
            color: #a29bfe;
            font-weight: 400;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 35px;
        }

        /* List 5 Anggota */
        .member-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* Menggunakan 6 kolom untuk fleksibilitas */
            gap: 15px;
        }

        .member-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 15px;
            color: #fff;
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            grid-column: span 3; /* Default: 2 kolom per baris */
        }

        /* Membuat anggota ke-5 berada di tengah jika ganjil */
        .member-item:nth-child(5) {
            grid-column: 2 / span 4; 
        }

        .member-item:hover {
            background: rgba(162, 155, 254, 0.2);
            transform: scale(1.05);
            border-color: #a29bfe;
        }

        .icon {
            font-size: 1.2rem;
        }

        .btn {
            margin-top: 40px;
            display: inline-block;
            padding: 12px 35px;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.4);
            transform: translateY(-2px);
        }

        /* Responsif Mobile */
        @media (max-width: 600px) {
            .member-item, .member-item:nth-child(5) {
                grid-column: span 6; /* List jadi memanjang ke bawah di HP */
            }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="glass-card">
        <h2>Creative Team</h2>
        <h1>NAMA KELOMPOK</h1>
        
        <div class="member-container">
            <div class="member-item"><span class="icon">✨</span> Anggota Satu</div>
            <div class="member-item"><span class="icon">🚀</span> Anggota Dua</div>
            <div class="member-item"><span class="icon">🎨</span> Anggota Tiga</div>
            <div class="member-item"><span class="icon">💻</span> Anggota Empat</div>
            <div class="member-item"><span class="icon">🔥</span> Anggota Lima</div>
        </div>

        <a href="#" class="btn">Mulai Penelusuran</a>
    </div>

</body>
</html>
